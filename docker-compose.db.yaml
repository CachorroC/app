services:
  postgres:
    image: postgres
    container_name: postgres
    hostname: postgres
    restart: always
    networks:
      - internal
    ports:
      - 5432:5432
    expose:
      - 5432
    env_file:
      - ./.env
    volumes:
      - database:/var/lib/postgresql/data

networks:
  internal:
    external: true # Tells docker to look for the network we created in Step 1

volumes:
  database:
    external: true
    name: database
