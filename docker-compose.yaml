services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    networks:
      - internal
    command: tunnel --no-autoupdate run --token eyJhIjoiZWQ2NmE1NDZlYWVhMWNlMDBlYjE2YmI1Yzc1NmFkY2EiLCJ0IjoiNjRlN2ZmZjQtZTg1My00OWNjLTljMDgtM2JkOWRlMjk2ZTZlIiwicyI6IlpqY3pNamMyT1RndE1XSXhOUzAwT1RjeExXSmhNV1V0T1RBMFpXUmxZV05qTVdVMiJ9
  app:
    image: app
    hostname: app
    restart: always
    container_name: app
    build:
      context: ./
      dockerfile: Dockerfile
      # ADD THIS SECTION IF you use NEXT_PUBLIC variables in your frontend code
      args:
        NEXT_PUBLIC_MONGODB_URI: 'mongodb+srv://cachorro_cami:Tengo1amo@cluster0.ffbyjzl.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0'
    env_file: .env
    environment:
      PORT: 3000
      # These are perfect here (Runtime Secrets)
      MONGODB_URI: ${MONGODB_URI}
      DATABASE_URL: postgresql://postgres:Tengo1amo@postgres:5432/RyS?schema=public
      NODE_ENV: production
      # Docker service-name DNS on the `internal` network — never 127.0.0.1, the
      # render service lives in its own container.
      MEMORIALES_RENDER_URL: http://memoriales-render:8787/render
    ports:
      - 5555:3000
    expose:
      - 3000
    networks:
      - internal
    depends_on:
      - memoriales-render

  memoriales-render:
    image: memoriales-render
    hostname: memoriales-render
    container_name: memoriales-render
    restart: always
    build:
      context: ./
      dockerfile: services/memoriales-render/Dockerfile
    networks:
      - internal
    # Deliberately no `ports`/`expose` and no cloudflared route: this service must
    # only be reachable from `app` over the internal Docker network, never from the
    # host or the internet.

networks:
  internal:
    external: true
    name: internal
